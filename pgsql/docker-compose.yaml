services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qq-bot-postgres
    environment:
      POSTGRES_DB: qq_bot_v2
      POSTGRES_USER: qq_user
      POSTGRES_PASSWORD: qq_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qq_user -d qq_bot_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
