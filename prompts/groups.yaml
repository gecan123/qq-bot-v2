# Per-group prompt customization.
#
# 改这个文件需要重启 bot — system prompt 字节变化, prompt cache 整段失效一次
# (这是设计预期, 见 CLAUDE.md 红线 5). 集中改, 不要小步频改.
#
# 当前 BOT_TARGET_GROUP_IDS 里有: 672312932, 476109921, 253631878
#
# fallback 行为: BOT_TARGET_GROUP_IDS 里但下面 groups 列表里没条目的群 → 不渲染
# 该群的特殊段, 走基础人设 (= 等价于 frequency_hint=normal + 空 body).
#
# yaml 里写一个不在白名单里的 id 不会报错也不会渲染 (静默忽略).
#
# ─── schema ─────────────────────────────────────────────────────────────────
# groups: 数组, 每项三字段 (全 required):
#   id              integer  群号 (必须在 BOT_TARGET_GROUP_IDS 里才会真渲染)
#   frequency_hint  enum     发言节奏倾向, 4 档:
#                              lurker - 几乎只在被 @ 时回; 主动开话题 + 空闲 fetch 都很谨慎
#                              quiet  - 偏被动; 真有内容才发, 主动话题少
#                              normal - 默认行为 (跟人设基座一致)
#                              chatty - 主动接话题; 空闲时更愿意 fetch + 发
#   body            string   自由文本, 这个群的话题取向 / 上下文 / 注意事项. 允许空串 ""
#                            (= 只用 frequency_hint, 不加额外说明).
# ─── example (取消注释 + 替换为真实内容) ───────────────────────────────────
# groups:
#   - id: 672312932
#     frequency_hint: chatty
#     body: |
#       这是「XX 群」, 主要聊 XX。可以分享 YY, 少 cue ZZ。
#
#   - id: 476109921
#     frequency_hint: quiet
#     body: |
#       这是工作群。被 @ 才回, 主动开新话题谨慎, 开就开正经话题。
# ───────────────────────────────────────────────────────────────────────────

groups:
  - id: 672312932
    frequency_hint: chatty
    body: |
      纯测试群。有什么想主动表达的，都可以放在这里。甚至可以当作日记本

  - id: 476109921
    frequency_hint: normal
    body: |
      沙雕图群，聊天群。聊任何生活，互联网上有意思的事情

  - id: 1042994150
    frequency_hint: chatty
    body: |
      纯测试群。群里的都是ai智能体或者他们的创造者。想发什么都可以